syntax = "proto3";

option java_package = "tgb.cryptoexchange.grpc.generated";
option java_multiple_files = true;

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/field_mask.proto";

service MerchantDetailsService {
  rpc CancelOrder (CancelOrderRequestGrpc) returns (google.protobuf.Empty);
  rpc GetConfig (MerchantConfigRequestGrpc) returns (MerchantConfigResponseGrpc);
  rpc UpdateConfig (UpdateMerchantConfigRequestGrpc) returns (google.protobuf.Empty);
  rpc GetAllGroupChatIds (google.protobuf.Empty) returns (GroupChatIdsResponseGrpc);
  rpc DeleteConfigField (DeleteConfigFieldRequestGrpc) returns (google.protobuf.Empty);
  rpc UpdateOrder (UpdateOrderRequestGrpc) returns (google.protobuf.Empty);
  rpc GetVariable (GetVariableRequestGrpc) returns (VariableDTOGrpc);
  rpc UpdateVariable (UpdateVariableRequestGrpc) returns (google.protobuf.Empty);
  rpc SendReceipt (SendReceiptRequestGrpc) returns (google.protobuf.Empty);
}

message CancelOrderRequestGrpc {
  string merchant = 1;
  string order_id = 2;
  string method = 3;
}

message PaginationGrpc {
  int32 page = 1;
  int32 size = 2;
  string sort = 3;
}

message MerchantConfigRequestGrpc {
  PaginationGrpc pagination = 1;
  string merchant = 2;
  google.protobuf.Int32Value merchant_order = 3;
  string sort = 4;
}

message MerchantOrderStatusGrpc {
  string name = 1;
  string description = 2;
}

message MerchantMethodGrpc {
  string name = 1;
  string description = 2;
}

message AutoConfirmConfigDTOGrpc {
  string crypto_currency = 1;
  string auto_confirm_type = 2;
  string delivery_type = 3;
}

message MerchantConfigDTOGrpc {
  int64 id = 1;
  bool is_on = 2;
  string merchant = 3;
  bool is_auto_withdrawal_on = 4;
  repeated MerchantOrderStatusGrpc statuses = 5;
  repeated string success_statuses = 6;
  repeated MerchantMethodGrpc methods = 7;
  google.protobuf.Int32Value max_amount = 8;
  google.protobuf.Int32Value min_amount = 9;
  google.protobuf.Int32Value merchant_order = 10;
  repeated AutoConfirmConfigDTOGrpc confirm_configs = 11;
  google.protobuf.Int64Value group_chat_id = 12;
}

message MerchantConfigResponseGrpc {
  bool success = 1;
  repeated MerchantConfigDTOGrpc data = 2;
  int64 total_count = 3;
}

message UpdateMerchantConfigRequestGrpc {
  int64 id = 1;
  google.protobuf.BoolValue is_on = 2;
  google.protobuf.BoolValue is_auto_withdrawal_on = 3;
  repeated string success_statuses = 4;
  google.protobuf.Int32Value max_amount = 5;
  google.protobuf.Int32Value min_amount = 6;
  google.protobuf.Int64Value group_chat_id = 7;
  repeated AutoConfirmConfigDTOGrpc confirm_configs = 8;
  google.protobuf.FieldMask update_mask = 15;
}

message DeleteConfigFieldRequestGrpc {
  int64 id = 1;
  string field_name = 2;
}

message UpdateOrderRequestGrpc {
  string merchant = 1;
  google.protobuf.BoolValue is_up = 2;
  google.protobuf.Int32Value new_order = 3;
}

enum VariableTypeGrpc {
  VARIABLE_TYPE_UNSPECIFIED = 0;
  ATTEMPTS_COUNT = 1;
  MIN_ATTEMPT_TIME = 2;
}

message VariableDTOGrpc {
  VariableTypeGrpc type = 1;
  string value = 2;
}

message GetVariableRequestGrpc {
  VariableTypeGrpc variable_type = 1;
}

message UpdateVariableRequestGrpc {
  VariableTypeGrpc variable_type = 1;
  string value = 2;
}

message SendReceiptRequestGrpc {
  string merchant = 1;
  string order_id = 2;
  bytes receipt_data = 3;
  string file_name = 4;
}

message GroupChatIdsResponseGrpc {
  repeated int64 group_chat_ids = 1;
}
