syntax = "proto3";

option java_package = "tgb.cryptoexchange.grpc.generated";
option java_multiple_files = true;

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/field_mask.proto";

service ApiDetailsRequestService {
  rpc DetailsRequest (DetailsRequestGrpc) returns (DetailsResponseGrpc);
}

message DetailsRequestGrpc {
  google.protobuf.StringValue request_id = 1;
  google.protobuf.StringValue internal_id = 2;
  google.protobuf.StringValue user_id = 3;
  google.protobuf.Int32Value amount = 4;
  repeated string request_method = 5;
}

message DetailsResponseGrpc {
  string request_id = 1;
  string merchant = 2;
  string order_id = 3;
  string  order_status = 4;
  DetailsGrpc details = 5;
  int32 amount = 6;
}

message DetailsGrpc {
  string request_method = 1;
  string details = 2;
  string bank = 3;
  string operator = 4;
}

message MerchantError {
  string reason = 1;
  string request_id = 2;
}